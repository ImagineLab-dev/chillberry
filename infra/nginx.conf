# infra/nginx.conf — server block del reverse proxy de producción.
#
# Se monta en el container oficial nginx:alpine como
# /etc/nginx/conf.d/default.conf. El nginx.conf principal de esa imagen ya
# tiene `include /etc/nginx/conf.d/*.conf;` dentro del bloque http, así que
# este archivo NO reemplaza el nginx.conf base (gzip, mime.types, etc. de la
# imagen se mantienen) — solo aporta el/los server block.
#
# Rutas:
#   /            -> web:3000   (Next.js)
#   /api         -> api:3001   (NestJS, prefijo global /api)
#   /socket.io   -> api:3001   (Socket.IO, mismo backend que /api, con upgrade headers)

# Connection: "upgrade" solo cuando la request realmente pide upgrade
# (handshake WebSocket). Socket.IO negocia primero por HTTP long-polling
# antes de subir a WS, así que /socket.io recibe ambos tipos de request.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Resolver embebido de Docker (127.0.0.11). Sin esto, nginx resuelve
# `api`/`web` una sola vez al arrancar y cachea esa IP para siempre: si esos
# containers se reinician (nueva IP) sin reiniciar nginx, el proxy_pass
# apunta a una IP muerta. Con `resolver` + `set $upstream_x ...` + variable
# en proxy_pass, nginx re-resuelve el nombre en cada request (según `valid`).
resolver 127.0.0.11 valid=10s;

# ===========================================================================
# Puerto 80 — sólo renovación de certificados y redirección a HTTPS.
#
# El dominio es `.app`, que está en la lista HSTS preload de los navegadores:
# Chrome, Firefox y Safari SE NIEGAN a abrir HTTP ahí, sin opción de continuar.
# O sea que servir por 80 no es "menos seguro": directamente no carga. Esta
# redirección existe para los enlaces viejos y para el desafío de Let's Encrypt.
# ===========================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot necesita servir esto por 80 para renovar. Va ANTES de la
    # redirección: si se redirigiera, la validación fallaría.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ===========================================================================
# Puerto 443 — todo el tráfico real.
#
# `server_name _` es catch-all: nginx acepta cualquier Host y deja que el
# middleware de Next resuelva si es la app o el subdominio de un restaurante.
#
# SOBRE EL CERTIFICADO: alcanza con uno común para el dominio raíz. El link que
# el sistema le da a cada restaurante para compartir es POR RUTA
# (`chillberry.app/r/mi-restaurante`, ver `branch-public-config.tsx`), no por
# subdominio. El `publicSubdomain` es una función opcional: recién cuando algún
# cliente la use hace falta un certificado wildcard, que sólo se emite por
# validación DNS-01 y —sin API de DNS— hay que renovar A MANO cada 90 días.
# ===========================================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # OJO: si estos archivos no existen, nginx NO ARRANCA (crashea en bucle).
    # Por eso el certificado se emite ANTES del primer `up` — ver docs/DEPLOY.md
    # sección 2.c, que explica cómo salir del huevo-y-gallina (nginx necesita el
    # cert para arrancar, y certbot --webroot necesita nginx para validar).
    ssl_certificate     /etc/letsencrypt/live/chillberry.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chillberry.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # El navegador recuerda que este dominio es sólo HTTPS. En `.app` es
    # redundante (ya viene preload), pero protege si algún día se agrega otro
    # dominio a este mismo nginx.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 10m;

    # --- Web (Next.js) ---
    location / {
        set $upstream_web http://web:3000;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API (NestJS) ---
    location /api {
        set $upstream_api http://api:3001;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Socket.IO (WebSocket + long-polling, mismo backend que /api) ---
    location /socket.io {
        set $upstream_socket http://api:3001;
        proxy_pass $upstream_socket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Conexiones long-lived: nginx corta por default a los 60s de
        # inactividad y tira el socket abajo. Subimos el timeout para que
        # las conexiones WS persistentes (cocina/meseros en vivo) no se caigan.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
