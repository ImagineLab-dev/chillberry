# ============================================================================
# SUPERSEDIDO — no lo uses. Se mantiene sólo como referencia.
# ============================================================================
#
# Chillberry se despliega con EASYPANEL, que corre en el VPS y construye las
# aplicaciones directamente desde este repo. Ver docs/DEPLOY-EASYPANEL.md.
#
# Este workflow asume otra cosa: entrar por SSH al servidor y manejar a mano un
# stack de docker-compose en /opt/chillberry. Eso NO es lo que hay hoy —
# Easypanel administra los servicios por su cuenta y ocupa los puertos 80/443,
# así que el nginx del compose ni siquiera podría levantar.
#
# Además nunca estuvo operativo: depende de tres secretos que no existen en la
# configuración del repo (DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY), así que
# falla en el primer paso.
#
# Sólo corre por `workflow_dispatch` (a mano), nunca solo. Si algún día salís de
# Easypanel a un servidor pelado, esto más docs/DEPLOY.md §2.c/2.d son el punto
# de partida — pero hay que cargar los secretos y verificarlo antes de confiar.
# ============================================================================

name: Deploy (manual, template)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  # PLACEHOLDER — confirm this matches the real deploy path once a host exists.
  DEPLOY_PATH: /opt/chillberry

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH into host and roll out latest images
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            docker compose -f infra/docker-compose.prod.yml pull
            docker compose -f infra/docker-compose.prod.yml up -d
            docker compose -f infra/docker-compose.prod.yml exec -T api pnpm --filter @chillberry/api exec prisma migrate deploy
