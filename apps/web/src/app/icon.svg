<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Favicon. Es el mismo logo del mail (mail.templates.ts) pero reencuadrado:
    el original deja aire arriba, y a 16px ese aire se come la figura hasta
    dejar una mancha. Acá la baya ocupa casi todo el alto y el tallo se acorta.

    Sin fondo a propósito: se apoya sobre la pestaña del navegador, que puede
    ser clara u oscura, y los colores de la baya contrastan con las dos.
  -->
  <path d="M15.5 13.5C14.8 9.6 14.2 6.6 17 3.6" fill="none" stroke="#5C8F74" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M19.4 14.4C18.6 10.6 17.6 7 17 3.6" fill="none" stroke="#5C8F74" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
