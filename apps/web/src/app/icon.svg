  <circle cx="11.8" cy="21.4" r="8.6" fill="#5533DB"/>
  <circle cx="21" cy="22.2" r="7.8" fill="#A63FD1"/>
  <ellipse cx="8.8" cy="17.8" rx="2.3" ry="1.6" fill="#FFFFFF" opacity="0.3"/>
